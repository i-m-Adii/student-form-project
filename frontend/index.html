<!DOCTYPE html>
<html>

<head>
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1><h1>Registration Portal</h1></h1>

    <form id="userForm">

        <input type="text" id="fullname" placeholder="Full Name" required>

        <input type="email" id="email" placeholder="Email" required>

        <div class="phone-box">
    <span>+91</span>
    <input type="tel" id="phone" placeholder="9876543210" pattern="[6-9][0-9]{9}" maxlength="10" required>
</div>
        

    <input type="text" id="age"placeholder="Age" maxlength="2" oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>


    <input type="text" id="city" placeholder="City" required>

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <button type="submit">Register</button>

    </form>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
